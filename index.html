<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>1 Minute Quiz</title>

<style>
    body {
        font-family: Arial;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .box {
        background: white;
        padding: 25px;
        width: 350px;
        border-radius: 10px;
        box-shadow: 0 0 10px #aaa;
        text-align: center;
    }

    button {
        padding: 10px;
        width: 100%;
        margin-top: 10px;
        background: #007bff;
        color: white;
        border: none;
        cursor: pointer;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
    }

    #message {
        margin-top: 10px;
        color: red;
    }

    #timer {
        margin-top: 10px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="box" id="home">
    <h2>1 Minute Quiz</h2>
    <button onclick="startQuiz()">Press to generate a question!</button>
</div>

<div class="box" id="quiz" style="display:none;">
    <h3 id="question"></h3>

    <input type="text" id="answer" placeholder="Your answer...">
    <button onclick="submitAnswer()">Submit</button>

    <p id="message"></p>
    <p id="timer">Time left: 60s</p>
</div>

<script>
/* =======================
   Question Pool
======================= */
const questions = [
    { q: "5 + 7 = ?", a: "12" },
    { q: "10 x 3 = ?", a: "30" },
    { q: "Capital of Vietnam?", a: "hanoi" },
    { q: "Opposite of 'hot'?", a: "cold" },
    { q: "15 - 6 = ?", a: "9" }
];

let currentAnswer = "";
let timeLeft = 60;
let timerInterval = null;

/* =======================
   Start Quiz
======================= */
function startQuiz() {
    document.getElementById("home").style.display = "none";
    document.getElementById("quiz").style.display = "block";

    generateQuestion();
    startTimer();
}

/* =======================
   Generate Question
======================= */
function generateQuestion() {
    const random = questions[Math.floor(Math.random() * questions.length)];
    document.getElementById("question").innerText = random.q;
    currentAnswer = random.a.toLowerCase();
}

/* =======================
   Timer
======================= */
function startTimer() {
    timeLeft = 60;
    updateTimer();

    timerInterval = setInterval(() => {
        timeLeft--;
        updateTimer();

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            endQuiz();
        }
    }, 1000);
}

function updateTimer() {
    document.getElementById("timer").innerText = "Time left: " + timeLeft + "s";
}

/* =======================
   Submit Answer
======================= */
function submitAnswer() {
    const input = document.getElementById("answer");
    const message = document.getElementById("message");

    const userAnswer = input.value.trim().toLowerCase();

    if (userAnswer === "") {
        message.innerText = "Please fill in the blank!";
        return;
    }

    clearInterval(timerInterval);

    if (userAnswer === currentAnswer) {
        message.style.color = "green";
        message.innerText = "Correct!";
    } else {
        message.style.color = "red";
        message.innerText = "Wrong! Correct answer: " + currentAnswer;
    }

    input.disabled = true;
}

/* =======================
   End Quiz (time out)
======================= */
function endQuiz() {
    document.getElementById("message").innerText =
        "Time's up! Answer: " + currentAnswer;

    document.getElementById("answer").disabled = true;
}
</script>

</body>
</html>
