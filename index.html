<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1 Minute Quiz</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */

* {

    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {

    background: #87CEEB;

    color: white;

    font-family: 'Poppins', sans-serif;

    overflow-x: hidden;
}

button {

    border: none;

    cursor: pointer;

    transition: 0.2s;
}

button:hover {

    transform: scale(1.03);

    opacity: 0.92;
}

input {

    width: 100%;

    padding: 12px;

    margin-top: 12px;

    border: none;

    border-radius: 8px;

    font-size: 16px;
}

a {

    color: white;

    font-weight: bold;

    text-decoration: underline;

    cursor: pointer;
}

/* =========================
   TOP RIGHT AUTH
========================= */

#topAuth {

    position: fixed;

    top: 20px;
    right: 20px;

    z-index: 999;
}

#topAuth button {

    padding: 10px 16px;

    margin-left: 8px;

    border-radius: 8px;

    background: white;

    color: #4ca8d6;

    font-weight: bold;
}

/* =========================
   LANDING PAGE
========================= */

#landingPage {

    height: 170vh;

    display: flex;

    flex-direction: column;

    align-items: center;
}

.hero {

    height: 100vh;

    display: flex;

    flex-direction: column;

    justify-content: center;
    align-items: center;

    text-align: center;
}

.hero h1 {

    font-family: 'Cinzel', serif;

    font-size: 72px;

    letter-spacing: 2px;
}

.hero p {

    margin-top: 18px;

    font-size: 20px;

    opacity: 0.95;
}

.scrollSection {

    height: 70vh;

    display: flex;

    flex-direction: column;

    justify-content: center;
    align-items: center;
}

.modeButton {

    width: 280px;

    padding: 18px;

    margin-top: 20px;

    border-radius: 12px;

    background: white;

    color: #4ca8d6;

    font-size: 20px;

    font-weight: bold;
}

/* =========================
   SCREEN
========================= */

.screen {

    min-height: 100vh;

    display: none;

    justify-content: center;
    align-items: center;
}

.box {

    width: 430px;

    padding: 30px;

    border-radius: 16px;

    background: rgba(255,255,255,0.16);

    backdrop-filter: blur(10px);

    text-align: center;
}

.box h2,
.box h3 {

    margin-bottom: 20px;
}

.box button {

    width: 100%;

    padding: 14px;

    margin-top: 12px;

    border-radius: 10px;

    background: white;

    color: #4ca8d6;

    font-size: 16px;

    font-weight: bold;
}

#timer {

    margin-top: 15px;

    font-size: 18px;

    font-weight: bold;
}

#message,
#authMessage {

    margin-top: 12px;

    min-height: 20px;

    color: #fff0f0;
}

#guestMessage {

    margin-top: 20px;
}

</style>

</head>

<body>

<!-- =========================
     TOP AUTH
========================= -->

<div id="topAuth">

    <button
        id="signupBtn"
        onclick="openSignup()"
    >
        Sign Up
    </button>

    <button
        id="loginBtn"
        onclick="openLogin()"
    >
        Log In
    </button>

    <button
        id="logoutBtn"
        onclick="logout()"
        style="display:none;"
    >
        Log Out
    </button>

</div>

<!-- =========================
     LANDING PAGE
========================= -->

<section id="landingPage">

    <div class="hero">

        <h1>1 Minute Quiz</h1>

        <p>
            Every Possible Question, One Minute
        </p>

    </div>

    <div class="scrollSection">

        <button
            class="modeButton"
            onclick="startQuickMode()"
        >
            Quick
        </button>

        <button
            class="modeButton"
            onclick="startEndlessMode()"
        >
            Endless
        </button>

    </div>

</section>

<!-- =========================
     AUTH SCREEN
========================= -->

<section
    class="screen"
    id="authScreen"
>

    <div class="box">

        <h2 id="authTitle">
            Sign Up
        </h2>

        <input
            type="text"
            id="playerName"
            placeholder="Username"
        >

        <input
            type="email"
            id="email"
            placeholder="Email"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button
            id="authButton"
            onclick="register()"
        >
            Sign Up
        </button>

        <button onclick="backHome()">
            Back
        </button>

        <p id="authMessage"></p>

    </div>

</section>

<!-- =========================
     QUIZ SCREEN
========================= -->

<section
    class="screen"
    id="quizScreen"
>

    <div class="box">

        <h3 id="question">
            Loading question...
        </h3>

        <input
            type="text"
            id="answer"
            placeholder="Your answer..."
        >

        <button onclick="submitAnswer()">
            Submit
        </button>

        <p id="message"></p>

        <p id="timer">
            Time left: 60s
        </p>

    </div>

</section>

<!-- =========================
     QUICK RESULT
========================= -->

<section
    class="screen"
    id="quickResultScreen"
>

    <div class="box">

        <h2 id="quickResultTitle"></h2>

        <p id="quickCorrectAnswer"></p>

        <button onclick="startQuickMode()">
            Another One
        </button>

        <button onclick="backHome()">
            Back to Menu
        </button>

    </div>

</section>

<!-- =========================
     ENDLESS RESULT
========================= -->

<section
    class="screen"
    id="endlessResultScreen"
>

    <div class="box">

        <h2>Game Over</h2>

        <p id="scoreText"></p>

        <p id="timeText"></p>

        <div id="guestMessage"></div>

        <button onclick="startEndlessMode()">
            Try Again
        </button>

        <button onclick="backHome()">
            Back to Menu
        </button>

    </div>

</section>

<!-- =========================
     FIREBASE SDK
========================= -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>

/* =========================
   FIREBASE CONFIG
========================= */

const firebaseConfig = {

    apiKey: "YOUR_API_KEY",

    authDomain: "YOUR_AUTH_DOMAIN",

    projectId: "YOUR_PROJECT_ID",

    storageBucket: "YOUR_STORAGE_BUCKET",

    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",

    appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const auth = firebase.auth();

/* =========================
   VARIABLES
========================= */

let currentMode = "";

let currentAnswer = "";

let timeLeft = 60;

let timerInterval = null;

let endlessScore = 0;

let endlessStartTime = 0;

/* =========================
   SCREEN CONTROL
========================= */

function hideAllScreens() {

    document.querySelectorAll(".screen")
        .forEach(screen => {

            screen.style.display = "none";
        });

    document.getElementById("landingPage")
        .style.display = "none";
}

function backHome() {

    clearInterval(timerInterval);

    hideAllScreens();

    document.getElementById("landingPage")
        .style.display = "flex";

    window.scrollTo({

        top: 0,

        behavior: "smooth"
    });
}

/* =========================
   AUTH PAGES
========================= */

function openSignup() {

    hideAllScreens();

    document.getElementById("authScreen")
        .style.display = "flex";

    document.getElementById("authTitle")
        .innerText = "Sign Up";

    document.getElementById("authButton")
        .innerText = "Sign Up";

    document.getElementById("authButton")
        .onclick = register;
}

function openLogin() {

    hideAllScreens();

    document.getElementById("authScreen")
        .style.display = "flex";

    document.getElementById("authTitle")
        .innerText = "Log In";

    document.getElementById("authButton")
        .innerText = "Log In";

    document.getElementById("authButton")
        .onclick = login;
}

/* =========================
   GAME MODES
========================= */

function startQuickMode() {

    currentMode = "quick";

    startQuiz();
}

function startEndlessMode() {

    currentMode = "endless";

    endlessScore = 0;

    endlessStartTime = Date.now();

    startQuiz();
}

/* =========================
   START QUIZ
========================= */

async function startQuiz() {

    clearInterval(timerInterval);

    hideAllScreens();

    document.getElementById("quizScreen")
        .style.display = "flex";

    document.getElementById("answer")
        .value = "";

    document.getElementById("message")
        .innerText = "";

    await generateQuestion();

    startTimer();
}

/* =========================
   QUESTION API
========================= */

async function generateQuestion() {

    const questionElement =
        document.getElementById("question");

    questionElement.innerText =
        "Loading question...";

    try {

        const response =
            await fetch(
                "https://opentdb.com/api.php?amount=1"
            );

        const data =
            await response.json();

        const questionData =
            data.results[0];

        questionElement.innerHTML =
            decodeHTML(questionData.question);

        currentAnswer =
            questionData.correct_answer
                .toLowerCase()
                .trim();

    } catch {

        questionElement.innerText =
            "Failed to load question.";
    }
}

/* =========================
   TIMER
========================= */

function startTimer() {

    clearInterval(timerInterval);

    timeLeft = 60;

    updateTimer();

    timerInterval = setInterval(() => {

        timeLeft--;

        updateTimer();

        if (timeLeft <= 0) {

            clearInterval(timerInterval);

            if (currentMode === "quick") {

                showQuickResult(false);

            } else {

                showEndlessResult();
            }
        }

    }, 1000);
}

function updateTimer() {

    document.getElementById("timer")
        .innerText =
        "Time left: " + timeLeft + "s";
}

/* =========================
   SUBMIT ANSWER
========================= */

async function submitAnswer() {

    const userAnswer =
        document.getElementById("answer")
            .value
            .trim()
            .toLowerCase();

    const message =
        document.getElementById("message");

    if (userAnswer === "") {

        message.innerText =
            "Please fill in the blank!";

        return;
    }

    /* QUICK MODE */

    if (currentMode === "quick") {

        clearInterval(timerInterval);

        if (userAnswer === currentAnswer) {

            showQuickResult(true);

        } else {

            showQuickResult(false);
        }

        return;
    }

    /* ENDLESS MODE */

    if (currentMode === "endless") {

        /* CORRECT */

        if (userAnswer === currentAnswer) {

            endlessScore++;

            document.getElementById("answer")
                .value = "";

            document.getElementById("message")
                .innerText = "";

            await generateQuestion();

            /* RESET TIMER */

            startTimer();
        }

        /* WRONG */

        else {

            clearInterval(timerInterval);

            showEndlessResult();
        }
    }
}

/* =========================
   QUICK RESULT
========================= */

function showQuickResult(correct) {

    hideAllScreens();

    document.getElementById("quickResultScreen")
        .style.display = "flex";

    const title =
        document.getElementById("quickResultTitle");

    if (correct) {

        title.innerText = "Correct!";

        title.style.color = "#c9ffd1";

    } else {

        title.innerText = "Wrong!";

        title.style.color = "#ffd1d1";
    }

    document.getElementById("quickCorrectAnswer")
        .innerText =
        "Correct answer: " + currentAnswer;
}

/* =========================
   ENDLESS RESULT
========================= */

async function showEndlessResult() {

    hideAllScreens();

    document.getElementById("endlessResultScreen")
        .style.display = "flex";

    const totalTime =
        Math.floor(
            (Date.now() - endlessStartTime) / 1000
        );

    document.getElementById("scoreText")
        .innerText =
        "Correct Answers: " + endlessScore;

    document.getElementById("timeText")
        .innerText =
        "Total Time: " + totalTime + " seconds";

    await saveScore(
        endlessScore,
        totalTime
    );

    const guestMessage =
        document.getElementById("guestMessage");

    if (!auth.currentUser) {

        guestMessage.innerHTML = `

            <p>

                <a onclick="openSignup()">
                    Sign Up
                </a>

                to Keep Your Score

            </p>

            <p style="margin-top:10px;">

                Have an account already?

                <a onclick="openLogin()">
                    Log In
                </a>

            </p>
        `;

    } else {

        guestMessage.innerHTML = "";
    }
}

/* =========================
   SAVE SCORE
========================= */

async function saveScore(score, time) {

    try {

        const user =
            auth.currentUser;

        const username =
            document.getElementById("playerName")
                .value
                .trim();

        await db.collection("scores").add({

            uid:
                user ? user.uid : null,

            email:
                user ? user.email : "Guest",

            username:
                username || "Anonymous",

            score: score,

            time: time,

            createdAt: new Date()
        });

    } catch (error) {

        console.error(error);
    }
}

/* =========================
   REGISTER
========================= */

async function register() {

    const email =
        document.getElementById("email")
            .value;

    const password =
        document.getElementById("password")
            .value;

    const authMessage =
        document.getElementById("authMessage");

    try {

        await auth
            .createUserWithEmailAndPassword(
                email,
                password
            );

        authMessage.style.color =
            "#d4ffd4";

        authMessage.innerText =
            "Registered successfully!";

    } catch (error) {

        authMessage.innerText =
            error.message;
    }
}

/* =========================
   LOGIN
========================= */

async function login() {

    const email =
        document.getElementById("email")
            .value;

    const password =
        document.getElementById("password")
            .value;

    const authMessage =
        document.getElementById("authMessage");

    try {

        await auth
            .signInWithEmailAndPassword(
                email,
                password
            );

        authMessage.style.color =
            "#d4ffd4";

        authMessage.innerText =
            "Login successful!";

    } catch (error) {

        authMessage.innerText =
            error.message;
    }
}

/* =========================
   LOGOUT
========================= */

async function logout() {

    await auth.signOut();

    document.getElementById("email")
        .value = "";

    document.getElementById("password")
        .value = "";

    document.getElementById("playerName")
        .value = "";

    backHome();
}

/* =========================
   AUTH STATE
========================= */

auth.onAuthStateChanged((user) => {

    const signupBtn =
        document.getElementById("signupBtn");

    const loginBtn =
        document.getElementById("loginBtn");

    const logoutBtn =
        document.getElementById("logoutBtn");

    if (user) {

        signupBtn.style.display =
            "none";

        loginBtn.style.display =
            "none";

        logoutBtn.style.display =
            "inline-block";

    } else {

        signupBtn.style.display =
            "inline-block";

        loginBtn.style.display =
            "inline-block";

        logoutBtn.style.display =
            "none";
    }
});

/* =========================
   HTML DECODE
========================= */

function decodeHTML(html) {

    const txt =
        document.createElement("textarea");

    txt.innerHTML = html;

    return txt.value;
}

</script>

</body>
</html>
